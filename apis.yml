    name: Xh CLI
    description: >-
      xh is a friendly and fast command-line HTTP client written in Rust.
      It reimplements HTTPie's design with improved performance, HTTP/2 and
      HTTP/3 support, and a single statically-linked binary. Supports JSON
      and form data serialization, session persistence, basic/bearer/digest
      authentication, SSL/TLS certificate handling, proxy configuration,
      Unix socket connections, multipart file uploads, and built-in curl
      command translation. Uses HTTPie-compatible request-item syntax for
      setting headers, JSON fields, query parameters, and form data.

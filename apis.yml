aid: xh
name: Xh
description: >-
  xh is a friendly and fast command-line HTTP client written in Rust, designed
  as a modern, high-performance alternative to HTTPie. It reimplements HTTPie's
  request-item syntax and design with improved startup speed, HTTP/2 and HTTP/3
  support, and availability as a single statically-linked binary. xh supports
  JSON and form data serialization, session management, authentication (basic,
  bearer, digest), SSL/TLS customization, multipart uploads, proxy configuration,
  and built-in curl command translation. Installable via Homebrew, Cargo, apt,
  pacman, and other package managers.
